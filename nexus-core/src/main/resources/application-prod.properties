# Production datasource.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 secrets.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Session/cookie settings.
server.servlet.session.timeout=20m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.tracking-modes=cookie

# Security policy config.
app.security.require-ssl=${APP_SECURITY_REQUIRE_SSL:false}
app.security.admin-emails=${APP_SECURITY_ADMIN_EMAILS:}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-CSRF-TOKEN
app.security.rate-limit.auth.max-requests=20
app.security.rate-limit.auth.window-seconds=60
app.security.frontend.success-url=${APP_FRONTEND_SUCCESS_URL}
app.security.frontend.failure-url=${APP_FRONTEND_FAILURE_URL}
