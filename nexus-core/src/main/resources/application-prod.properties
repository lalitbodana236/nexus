# Production datasource (set via environment/secret manager).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# OAuth2 secrets (set via environment/secret manager).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Enforce HTTPS and hardened cookies in production.
server.servlet.session.timeout=20m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.tracking-modes=cookie

# Security policy config.
app.security.require-ssl=true
app.security.admin-emails=${APP_SECURITY_ADMIN_EMAILS:}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-CSRF-TOKEN
app.security.rate-limit.auth.max-requests=20
app.security.rate-limit.auth.window-seconds=60
app.security.frontend.success-url=${APP_FRONTEND_SUCCESS_URL}
app.security.frontend.failure-url=${APP_FRONTEND_FAILURE_URL}
