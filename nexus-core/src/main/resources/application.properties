spring.application.name=nexus-core

# Active profile defaults to dev for developer convenience.
spring.profiles.default=dev

# Shared server configuration.
server.port=10001

# Shared OAuth2 registration settings (secrets come from env or profile files).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Shared OAuth2 provider configuration.
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Shared persistence settings.
# Database config is profile-specific (application-dev.properties / application-prod.properties).

# Shared datasource pool settings.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# Frontend OAuth2 redirect URLs.
app.security.frontend.success-url=http://localhost/auth/callback?login=success
app.security.frontend.failure-url=http://localhost/login?error=oauth
