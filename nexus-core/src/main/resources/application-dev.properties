# Development datasource.
spring.datasource.url=jdbc:mysql://localhost:3306/nexus_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nexus_db}
#spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=${DB_PASSWORD:postgres}
#spring.datasource.driver-class-name=org.postgresql.Driver
#
## JPA / Hibernate settings.
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 secrets.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Local session/cookie settings.
server.servlet.session.timeout=20m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.tracking-modes=cookie

# Security policy config.
app.security.require-ssl=false
app.security.admin-emails=${APP_SECURITY_ADMIN_EMAILS:}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://localhost:4200}
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-CSRF-TOKEN
app.security.rate-limit.auth.max-requests=40
app.security.rate-limit.auth.window-seconds=60
app.security.frontend.success-url=${APP_FRONTEND_SUCCESS_URL:http://localhost:4200/auth/callback?login=success}
app.security.frontend.failure-url=${APP_FRONTEND_FAILURE_URL:http://localhost:4200/login?error=oauth}
