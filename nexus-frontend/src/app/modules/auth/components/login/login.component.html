<section class="login-shell">
  <div class="card login-card">
    <div class="card-body p-4">
      <h1 class="h4 mb-2">Sign In</h1>
      <p class="text-secondary mb-4">
        Public users can browse question lists. Login is required to view solutions.
      </p>

      <div class="d-grid gap-2">
        <button type="button" class="btn btn-primary" (click)="loginAsUser()">Login as User</button>
        <button type="button" class="btn btn-outline-warning" (click)="loginAsAdmin()">Login as Admin</button>
      </div>
    </div>
  </div>
</section>
