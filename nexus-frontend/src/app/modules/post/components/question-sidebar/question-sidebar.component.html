<aside class="q-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-body">
    <div class="question-list" *ngIf="!isCollapsed && showQuestionList" (scroll)="onScroll($event)">
      <h3>All Questions</h3>
      <small>{{ questions.length }} items</small>

      <button
        type="button"
        class="q-item"
        *ngFor="let question of visibleQuestions; trackBy: trackByQuestionId"
        (click)="openQuestion(question.id)"
      >
        <span class="q-title">{{ question.title }}</span>
        <span class="q-meta">{{ question.track }} | {{ question.difficulty }}</span>
      </button>
    </div>

    <nav class="track-nav" *ngIf="!isCollapsed && !showQuestionList" aria-label="Practice tracks">
      <h3>Practice Tracks</h3>
      <small>Choose a focused interview path.</small>

      <button type="button" class="track-item" [class.active]="currentTrack === 'coding'" (click)="openTrack('coding')">
        <span class="track-icon">C</span>
        <span>
          <strong>Coding 250</strong>
          <small>Algorithms and patterns</small>
        </span>
      </button>

      <button type="button" class="track-item" [class.active]="currentTrack === 'system-design'" (click)="openTrack('system-design')">
        <span class="track-icon">S</span>
        <span>
          <strong>System Design</strong>
          <small>Architecture rounds</small>
        </span>
      </button>

      <button type="button" class="track-item" [class.active]="currentTrack === 'low-level-design'" (click)="openTrack('low-level-design')">
        <span class="track-icon">L</span>
        <span>
          <strong>Low Level Design</strong>
          <small>OOP and SOLID</small>
        </span>
      </button>
    </nav>

    <app-user-panel
      [collapsed]="isCollapsed"
      [username]="username"
      [role]="roleLabel"
      (profileClick)="openProfile()"
      (settingsClick)="openSettings()"
      (logoutClick)="logout()"
    ></app-user-panel>
  </div>
</aside>
